name: CI

on:
  push:
    branches: [main, agent/fix-loop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r DealStack/sales-prospecting/requirements.txt
      - run: pip install flake8
      - run: flake8 DealStack/sales-prospecting/ --max-line-length=120 --exclude=sales-prospecting/pet-price-comparator

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r DealStack/sales-prospecting/requirements.txt
      - run: pip install pytest pytest-cov
      - run: python3 -m pytest tests/ -v --cov=DealStack/sales-prospecting
        env:
          STORAGE_MODE: json
          JWT_SECRET: ci-test-secret-key-not-for-production
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: ci-test-admin-pw
